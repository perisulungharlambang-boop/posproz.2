<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import Produk Massal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 32px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      font-size: 24px;
      font-weight: 900;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    p {
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
    }
    .file-area {
      border: 2px dashed #cbd5e1;
      border-radius: 24px;
      padding: 40px 20px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .file-area:hover {
      border-color: #10b981;
      background: #f0fdf4;
    }
    .file-area.dragover {
      border-color: #10b981;
      background: #ecfdf5;
    }
    .file-area svg { color: #94a3b8; margin-bottom: 12px; }
    .file-area h3 { color: #475569; font-size: 16px; font-weight: 700; }
    .file-area small { color: #94a3b8; font-size: 12px; display: block; margin-top: 4px; }
    .file-area input { display: none; }
    .progress-container {
      display: none;
      margin: 20px 0;
    }
    .progress-container.visible { display: block; }
    .progress-bar-bg {
      width: 100%;
      height: 10px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #059669);
      border-radius: 999px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-primary {
      background: #10b981;
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      background: #059669;
      transform: scale(1.01);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #e2e8f0;
      color: #475569;
      margin-top: 10px;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #cbd5e1;
    }
    .result {
      display: none;
      margin-top: 20px;
      padding: 16px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 600;
    }
    .result.success {
      display: block;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: #065f46;
    }
    .result.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
    }
    .stats {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .stat-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 12px;
    }
    .stat-box .num {
      font-size: 20px;
      font-weight: 900;
      color: #1e293b;
    }
    .stat-box .label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      margin-top: 2px;
    }
    .footer {
      margin-top: 16px;
      font-size: 10px;
      color: #94a3b8;
      font-weight: 600;
    }
    .footer a {
      color: #10b981;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>📦 Import Produk Massal</h1>
    <p>Upload file JSON produk ke aplikasi POS</p>

    <div class="file-area" id="fileArea">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <h3>Pilih file JSON</h3>
      <small>Klik di sini untuk memilih file</small>
      <input type="file" id="fileInput" accept=".json" />
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar-bg">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text">
        <span id="progressLabel">Memulai...</span>
        <span id="progressPercent">0%</span>
      </div>
    </div>

    <button class="btn btn-primary" id="importBtn" disabled>
      Pilih file terlebih dahulu
    </button>
    <button class="btn btn-secondary" id="loadSampleBtn" style="display:none;">
      Muat Data Produk Default
    </button>

    <div class="result success" id="resultSuccess" style="display:none;">
      <strong>✅ Import Berhasil!</strong>
      <div class="stats" id="successStats"></div>
    </div>
    <div class="result error" id="resultError" style="display:none;"></div>

    <div class="footer">
      Format: JSON array dengan field name, sku, barcode, category, priceRetail, priceWholesale, stock, min_stock
    </div>
  </div>

  <script>
    const fileArea = document.getElementById('fileArea');
    const fileInput = document.getElementById('fileInput');
    const importBtn = document.getElementById('importBtn');
    const loadSampleBtn = document.getElementById('loadSampleBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    const progressPercent = document.getElementById('progressPercent');
    const resultSuccess = document.getElementById('resultSuccess');
    const resultError = document.getElementById('resultError');
    const successStats = document.getElementById('successStats');

    let selectedFile = null;

    // File area click
    fileArea.addEventListener('click', () => fileInput.click());
    fileArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      fileArea.classList.add('dragover');
    });
    fileArea.addEventListener('dragleave', () => {
      fileArea.classList.remove('dragover');
    });
    fileArea.addEventListener('drop', (e) => {
      e.preventDefault();
      fileArea.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        handleFile(fileInput.files[0]);
      }
    });

    function handleFile(file) {
      if (!file.name.endsWith('.json')) {
        showError('File harus berformat .json');
        return;
      }
      selectedFile = file;
      document.querySelector('.file-area h3').textContent = file.name;
      document.querySelector('.file-area small').textContent = (file.size / 1024 / 1024).toFixed(1) + ' MB';
      importBtn.textContent = 'Mulai Import ' + file.name;
      importBtn.disabled = false;
      resultSuccess.style.display = 'none';
      resultError.style.display = 'none';
    }

    importBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      importBtn.disabled = true;
      progressContainer.classList.add('visible');
      progressBar.style.width = '0%';
      progressLabel.textContent = 'Membaca file...';
      progressPercent.textContent = '0%';
      resultSuccess.style.display = 'none';
      resultError.style.display = 'none';

      try {
        // Baca file
        const text = await selectedFile.text();
        const products = JSON.parse(text);

        if (!Array.isArray(products) || products.length === 0) {
          throw new Error('File tidak mengandung array produk yang valid');
        }

        progressLabel.textContent = 'Total ' + products.length + ' produk ditemukan';
        progressPercent.textContent = '5%';
        progressBar.style.width = '5%';

        // Kirim ke IndexedDB melalui halaman utama
        // Karena kita di halaman terpisah, kita simpan di localStorage
        // lalu redirect ke halaman utama dengan instruksi import
        const CHUNK_SIZE = 500;
        const totalChunks = Math.ceil(products.length / CHUNK_SIZE);

        for (let i = 0; i < totalChunks; i++) {
          const start = i * CHUNK_SIZE;
          const end = Math.min(start + CHUNK_SIZE, products.length);
          const chunk = products.slice(start, end);
          
          // Simpan chunk di localStorage
          localStorage.setItem('pos_import_chunk_' + i, JSON.stringify(chunk));
          
          const percent = 5 + Math.round(((i + 1) / totalChunks) * 85);
          progressBar.style.width = percent + '%';
          progressLabel.textContent = `Menyiapkan chunk ${i + 1}/${totalChunks}...`;
          progressPercent.textContent = percent + '%';
          
          // Beri waktu untuk UI update
          await new Promise(r => setTimeout(r, 10));
        }

        // Simpan metadata
        localStorage.setItem('pos_import_total', String(products.length));
        localStorage.setItem('pos_import_chunks', String(totalChunks));

        progressBar.style.width = '95%';
        progressLabel.textContent = 'Siap diimport!';
        progressPercent.textContent = '95%';

        importBtn.textContent = 'Buka Halaman Produk & Import';
        importBtn.onclick = () => {
          window.location.href = '/inventory';
        };

        progressBar.style.width = '100%';
        progressLabel.textContent = '✅ Selesai! Data siap diimport.';
        progressPercent.textContent = '100%';

        showSuccess(products.length);

      } catch (e) {
        console.error('Import error:', e);
        showError('Gagal import: ' + e.message);
        importBtn.textContent = 'Coba Lagi';
        importBtn.disabled = false;
        progressContainer.classList.remove('visible');
      }
    });

    function showSuccess(count) {
      resultSuccess.style.display = 'block';
      successStats.innerHTML = `
        <div class="stat-box">
          <div class="num">${count.toLocaleString('id-ID')}</div>
          <div class="label">Produk</div>
        </div>
        <div class="stat-box">
          <div class="num">${localStorage.getItem('pos_import_chunks') || '0'}</div>
          <div class="label">Chunk</div>
        </div>
        <div class="stat-box">
          <div class="num">Siap</div>
          <div class="label">Status</div>
        </div>
      `;
    }

    function showError(msg) {
      resultError.textContent = '❌ ' + msg;
      resultError.style.display = 'block';
    }
  </script>
</body>
</html>
